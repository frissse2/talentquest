---
cilium_release_name: cilium
cilium_namespace: kube-system

cilium_helm_repo_name: cilium
cilium_helm_repo_url: https://helm.cilium.io/
cilium_chart_ref: "{{ cilium_helm_repo_name }}/cilium"
cilium_chart_version: "v1.19.2"

cilium_helm_wait_timeout: 5m
cilium_rollout_timeout: 300s
cilium_talos_health_timeout: 2m
cilium_daemonset_name: cilium

cilium_helm_values:
  ipam:
    mode: kubernetes
  kubeProxyReplacement: false
  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
  cgroup:
    autoMount:
      enabled: false
    hostRoot: /sys/fs/cgroup
  operator:
    replicas: 1

cilium_helm_extra_values: {}
