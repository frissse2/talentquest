---
- name: Check SOPS age key file exists
  ansible.builtin.stat:
    path: "{{ sops_age_key_file }}"
  register: sops_age_key_stat

- name: Fail if SOPS age key file is missing
  ansible.builtin.fail:
    msg: "SOPS age key file was not found at {{ sops_age_key_file }}."
  when: not sops_age_key_stat.stat.exists

- name: Create or update SOPS age secret in Flux namespace
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig_path }} create secret generic {{ sops_age_secret_name }}
    -n {{ sops_age_secret_namespace }}
    --from-file=age.agekey={{ sops_age_key_file }}
    --dry-run=client -o yaml
  register: sops_secret_manifest
  changed_when: false

- name: Apply SOPS age secret manifest
  ansible.builtin.shell: >
    kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
  args:
    stdin: "{{ sops_secret_manifest.stdout }}"
  register: sops_secret_apply
  changed_when: "'created' in sops_secret_apply.stdout or 'configured' in sops_secret_apply.stdout"

- name: Verify SOPS age secret exists
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig_path }} get secret {{ sops_age_secret_name }}
    -n {{ sops_age_secret_namespace }}
  register: sops_secret_verify
  changed_when: false