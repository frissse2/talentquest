apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: platform
spec:
  interval: 30m
  chart:
    spec:
      chart: local-path-provisioner
      version: "0.0.31"
      sourceRef:
        kind: HelmRepository
        name: local-path-provisioner
        namespace: platform
  values:
    storageClass:
      name: local-path
      defaultClass: true
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/local/storage