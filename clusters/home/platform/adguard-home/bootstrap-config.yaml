apiVersion: v1
kind: ConfigMap
metadata:
  name: adguard-home-bootstrap
  namespace: platform
data:
  AdGuardHome.yaml: |
    schema_version: 29
    http:
      address: 0.0.0.0:80
      session_ttl: 720h
    users: []
    auth_attempts: 5
    block_auth_min: 15
    dns:
      bind_hosts:
        - 0.0.0.0
      port: 53
      protection_enabled: true
      filtering_enabled: true
      blocking_mode: default
      upstream_dns:
        - 1.1.1.1
        - 1.0.0.1
        - 9.9.9.9
      bootstrap_dns:
        - 1.1.1.1
        - 1.0.0.1
      fallback_dns:
        - 9.9.9.9
        - 149.112.112.112
      use_private_ptr_resolvers: false
    filtering:
      rewrites:
        - domain: jellyfin.home.arpa
          answer: 192.168.178.240
        - domain: sabnzbd.home.arpa
          answer: 192.168.178.240
        - domain: sonarr.home.arpa
          answer: 192.168.178.240
        - domain: radarr.home.arpa
          answer: 192.168.178.240
        - domain: traefik.home.arpa
          answer: 192.168.178.240
        - domain: adguard.home.arpa
          answer: 192.168.178.241
