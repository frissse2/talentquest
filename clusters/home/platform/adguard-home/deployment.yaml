apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      initContainers:
        - name: prepare-data
          image: alpine:3.22
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /config /data/work
              cp /bootstrap/AdGuardHome.yaml /config/AdGuardHome.yaml
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: bootstrap-config
              mountPath: /bootstrap
              readOnly: true
      containers:
        - name: adguard-home
          image: adguard/adguardhome:v0.107.65
          args:
            - -c
            - /opt/adguardhome/conf/AdGuardHome.yaml
            - -w
            - /opt/adguardhome/work
            - --no-check-update
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
            - name: admin
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /opt/adguardhome/work
              subPath: work
            - name: config
              mountPath: /opt/adguardhome/conf
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: adguard-home-data
        - name: config
          emptyDir: {}
        - name: bootstrap-config
          configMap:
            name: adguard-home-bootstrap
