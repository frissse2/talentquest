apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      initContainers:
        - name: prepare-data
          image: alpine:3.22
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /data/conf /data/work
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: adguard-home
          image: adguard/adguardhome:v0.107.65
          args:
            - --no-check-update
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
            - name: admin
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /opt/adguardhome/conf
              subPath: conf
            - name: data
              mountPath: /opt/adguardhome/work
              subPath: work
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: adguard-home-data
