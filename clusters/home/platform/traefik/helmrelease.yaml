apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: platform
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "34.5.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: platform
  values:
    service:
      type: LoadBalancer
      annotations:
        metallb.io/loadBalancerIPs: 192.168.178.240
      spec:
        externalTrafficPolicy: Local
    ports:
      web:
        port: 8000
        exposedPort: 80
      websecure:
        port: 8443
        exposedPort: 443
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.home.arpa`)
        entryPoints:
          - web
